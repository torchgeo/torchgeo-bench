cal_size: 400
n_ensemble: 5
laplace_batch_size: 512
laplace_pred_batch_size: 64

methods:
  - uncalibrated
  - temp_scaling
  - bootstrap_ensemble
  - deep_ensemble
  - laplace
  - conformal

corruptions:
  - clean
  - cloud
  - poisson_gaussian
  - motion_blur

cloud_pattern_mode: fixed_across_severity

corruption_severities: [1, 2, 3, 4, 5]
conformal_alpha: 0.1
ece_bins: 15
ece_binning: equal_width
output: results/uq_results.csv

trace:
  enabled: false
  dataset_root: results/uq_traces
  run_id: null
  compression: zstd
  overwrite: false
  include_conformal: false

reliability:
  bins: 15
  binning: equal_width
