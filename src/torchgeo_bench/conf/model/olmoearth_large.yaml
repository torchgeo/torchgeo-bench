# OlmoEarth-v1-Large (AI2 geospatial foundation model)
# Feature dimension: 1024
# Default: RGB mode (3 channels). For full S2, set dataset.bands=all
# The wrapper applies OlmoEarth's internal Normalizer regardless of the
# dataset.normalization setting (normalize_inputs is overridden to identity).

_target_: torchgeo_bench.models.OlmoEarthBenchModel
model_size: large
patch_size: 8
input_res: null
time_steps: 1
std_multiplier: 2.0
normalize: false
image_size: null  # OlmoEarth is resolution-flexible; evaluate at native size
sensor_remap:
  landsat: landsat_as_s2  # route Landsat through S2 normalizer (+6.6pp on m-forestnet)
min_image_size: 64  # upsample 32-px datasets (e.g. m-so2sat) for denser patch grids
name: olmoearth_v1_large
