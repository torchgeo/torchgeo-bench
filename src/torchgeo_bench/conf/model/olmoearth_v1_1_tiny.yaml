# OlmoEarth-v1.1-Tiny (AI2 geospatial foundation model)
# Feature dimension: 192
# v1.1 improves accuracy with ~6.2M params.

_target_: torchgeo_bench.models.OlmoEarthBenchModel
model_size: tiny
version: v1_1
patch_size: 8
input_res: null
time_steps: 1
std_multiplier: 2.0
normalize: false
sensor_remap:
  landsat: landsat_as_s2
min_image_size: 64
name: olmoearth_v1_1_tiny
svgp_pca_dim: 128
eval:
  segmentation:
    # Isotropic OlmoEarth v1.1 tiny (12 encoder blocks, 192ch, 28x28 token
    # grid). No spatial pyramid: pick 4 blocks spread across depth, deepest
    # first. Uses the encoder path (not decoder/target_encoder).
    layers:
      - "encoder_model.encoder.blocks.11"
      - "encoder_model.encoder.blocks.8"
      - "encoder_model.encoder.blocks.5"
      - "encoder_model.encoder.blocks.2"
