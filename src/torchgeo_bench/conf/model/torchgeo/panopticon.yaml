_target_: torchgeo_bench.models.TorchGeoPanopticonBench
factory: panopticon_vitb14
weights_class: Panopticon_Weights
weights_member: VIT_BASE14
auto_resize: true
target_size: 224
name: tgeo_panopticon
eval:
  segmentation:
    # Isotropic Panopticon ViT-B/14 (12 transformer blocks, 768ch, 16x16 grid).
    # No spatial pyramid: pick 4 blocks spread across depth, deepest first.
    # `model.*` prefix matches named_modules(); SegmentationProbe strips only
    # a leading `backbone.`, so the `model.` prefix is kept here.
    layers: ["model.blocks.11", "model.blocks.8", "model.blocks.5", "model.blocks.2"]
