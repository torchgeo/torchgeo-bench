# torchgeo DOFA-Base — MAE pretraining (band-agnostic, RGB wavelengths)
# Feature dimension: 768

_target_: torchgeo_bench.models.TorchGeoDOFABench
num_channels: 3
factory: dofa_base_patch16_224
weights_class: DOFABase16_Weights
weights_member: DOFA_MAE
wavelengths: [0.665, 0.56, 0.49]
auto_resize: true
target_size: 224
name: tgeo_dofa_base
normalization: none
eval:
  segmentation:
    # ViT-Base (12 blocks, 768ch). Coarse-to-fine: deepest block first.
    # backbone.* prefix is stripped by SegmentationProbe automatically.
    layers: ["blocks.11", "blocks.8", "blocks.5", "blocks.2"]
