# ConvNeXt-Base (88M params)
# Feature dimension: 1024
# Model: convnext_base

_target_: torchgeo_bench.models.TimmPatchBenchModel
num_channels: 3
model_name: convnext_base
pretrained: true
global_pool: avg
seed: null
name: convnext_base
eval:
  segmentation:
    # Layers in coarse-to-fine order (deepest first) for FPN head.
    # For ASPP head, only the last entry (stages.3) is used.
    layers: ["stages.3", "stages.2", "stages.1", "stages.0"]
