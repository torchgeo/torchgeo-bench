# MobileNetV3-Large (5M params)
# Feature dimension: 960
# Model: mobilenetv3_large_100

_target_: torchgeo_bench.models.TimmPatchBenchModel
num_channels: 3
model_name: mobilenetv3_large_100
pretrained: true
global_pool: avg
seed: null
name: mobilenetv3_large_100
eval:
  segmentation:
    # Layers in coarse-to-fine order (deepest first) for FPN head.
    # Spatial sizes (224px input): 7, 7, 14, 56. Note blocks.5/6 share 7×7.
