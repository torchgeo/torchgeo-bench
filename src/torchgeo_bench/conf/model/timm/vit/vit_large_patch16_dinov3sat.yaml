# ViT-Large Patch16 224
# Feature dimension: 1024
# Model: vit_large_patch16_224

_target_: torchgeo_bench.models.TimmPatchBenchModel
model_name: vit_large_patch16_dinov3.sat493m
pretrained: true
global_pool: avg
seed: null
name: vit_large_patch16_dinov3sat
auto_resize: true
use_cls_token: false
eval:
  segmentation:
    # Isotropic DINOv3 ViT-Large (24 transformer blocks). No spatial pyramid:
    # pick 4 blocks spread across depth, deepest first. Register/CLS tokens are
    # dropped automatically by SegmentationProbe when reshaping to a grid.
    layers: ["blocks.23", "blocks.17", "blocks.11", "blocks.5"]
