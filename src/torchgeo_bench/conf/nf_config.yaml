defaults:
  - model: ???
  - _self_

seed: 0
device: cpu
verbose: false
resume: false

dataset:
  names: all
  partition: default
  batch_size: 64
  num_workers: 4
  normalization: bandspec_zscore
  bands: rgb
  image_size: 224
  interpolation: bilinear

nf:
  preprocessing: l2   # one of: l2 | standard | zca_l2
  output: results/nf_results.csv
  n_trials: 10
  bootstrap: 200
  epochs: 100
  batch_size: 512
  n_transforms: 16     # number of MAF affine transforms
  hidden_size: 512     # MADE hidden layer width; null → D//8 (default heuristic)

hydra:
  run:
    dir: .
  output_subdir: null
