name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run tests
        # `-n auto` parallelises across the runner's CPUs (typically 4 on
        # GitHub-hosted ubuntu-latest). `--dist=loadfile` groups tests by
        # file so per-file heavy fixtures aren't repeated across workers.
        run: uv run pytest -n auto --dist=loadfile

  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run pre-commit
        run: uv run pre-commit run --all-files -v
