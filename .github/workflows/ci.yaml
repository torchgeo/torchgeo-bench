name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            extras: --extra dev --extra id --extra olmoearth
            cache-tag: dev-id-olmoearth
          - os: macos-latest
            extras: --extra dev
            cache-tag: dev
          - os: windows-latest
            extras: --extra dev
            cache-tag: dev
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      OMP_NUM_THREADS: "1"
      KMP_DUPLICATE_LIB_OK: "TRUE"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
      - name: Enable Git long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true
      - name: Cache .venv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.13-${{ hashFiles('uv.lock') }}-${{ matrix.cache-tag }}
      - name: Install dependencies
        run: uv sync ${{ matrix.extras }} --frozen
      - name: Run tests
        run: uv run pytest -n auto --dist=loadfile --cov=torchgeo_bench --cov-report=xml
      - name: Upload coverage to Codecov
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  install:
    name: install (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
      - name: Enable Git long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true
      - name: Install (CPU only, no [cuda] extra)
        run: uv sync --frozen
      - name: Smoke test (CLI entry point)
        run: uv run torchgeo-bench --help

  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
      - name: Cache .venv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.13-${{ hashFiles('uv.lock') }}-dev-id
      - name: Install dependencies
        run: uv sync --extra dev --extra id --frozen
      - name: Cache pre-commit hooks
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run pre-commit
        run: uv run pre-commit run --all-files -v
