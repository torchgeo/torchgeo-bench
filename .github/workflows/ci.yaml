name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
      - name: Cache .venv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.13-${{ hashFiles('uv.lock') }}-dev-id-olmoearth
      - name: Install dependencies
        run: uv sync --extra dev --extra id --extra olmoearth --frozen
      - name: Run tests
        run: uv run pytest -n auto --dist=loadfile --cov=torchgeo_bench --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Prove the default CPU-only install works on Linux and macOS.
  install:
    name: install (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
      - name: Install (CPU only, no [cuda] extra)
        run: uv sync --frozen
      - name: Smoke test (CLI entry point)
        run: uv run torchgeo-bench --help

  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
      - name: Cache .venv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.13-${{ hashFiles('uv.lock') }}-dev-id
      - name: Install dependencies
        run: uv sync --extra dev --extra id --frozen
      - name: Cache pre-commit hooks
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run pre-commit
        run: uv run pre-commit run --all-files -v
