# ConvNeXt-Tiny (28M params)
# Feature dimension: 768
# Model: convnext_tiny

_target_: src.models.TimmPatchBenchModel
num_channels: 3
model_name: convnext_tiny
pretrained: true
global_pool: avg
seed: null
name: convnext_tiny
eval:
  segmentation:
    # Layers in coarse-to-fine order (deepest first) for FPN head.
    # For ASPP head, only the last entry (stages.3) is used.
    layers: ["stages.3", "stages.2", "stages.1", "stages.0"]
